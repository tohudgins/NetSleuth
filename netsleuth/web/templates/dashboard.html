<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NetSleuth</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="brand">🛰️ <strong>NetSleuth</strong> <span class="muted">network security dashboard</span></div>
    <div class="notice">⚠️ Authorized use only — scan/capture systems you own or are permitted to test.</div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="scan">Scan</button>
    <button class="tab" data-tab="pcap">Analyze capture</button>
    <button class="tab" data-tab="live">Live capture</button>
  </nav>

  <!-- SCAN -->
  <section id="tab-scan" class="panel active">
    <form id="scan-form" class="controls">
      <label>Target <input name="target" value="127.0.0.1"></label>
      <label>Ports <input name="ports" value="1-1024"></label>
      <label class="check"><input type="checkbox" name="udp"> UDP</label>
      <label class="check"><input type="checkbox" name="connect"> Force connect</label>
      <label class="check"><input type="checkbox" name="cve"> CVE lookup</label>
      <button type="submit">Run scan</button>
      <span class="spinner" id="scan-spin" hidden>scanning…</span>
    </form>
    <div id="scan-results" class="results"></div>
  </section>

  <!-- PCAP -->
  <section id="tab-pcap" class="panel">
    <form id="pcap-form" class="controls">
      <label>Capture file <input type="file" name="file" accept=".pcap,.pcapng,.cap"></label>
      <button type="submit">Analyze</button>
      <span class="spinner" id="pcap-spin" hidden>analyzing…</span>
    </form>
    <p class="muted small">Tip: generate samples with <code>python lab/generate_samples.py</code>, or use a public capture.</p>
    <div id="pcap-results" class="results"></div>
  </section>

  <!-- LIVE -->
  <section id="tab-live" class="panel">
    <form id="live-form" class="controls">
      <label>Interface <input name="iface" placeholder="en0 (blank = default)"></label>
      <label>BPF filter <input name="filter" placeholder="e.g. tcp port 80"></label>
      <button type="submit" id="live-start">Start</button>
      <button type="button" id="live-stop" disabled>Stop</button>
      <span class="spinner" id="live-status"></span>
    </form>
    <div id="live-results" class="results"></div>
    <div id="live-packets" class="packets"></div>
  </section>

  <footer class="muted small">NetSleuth · localhost only · live capture needs sudo</footer>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
